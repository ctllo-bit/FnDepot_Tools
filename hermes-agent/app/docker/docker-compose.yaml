services:
  hermes-agent:
    image: nousresearch/hermes-agent
    container_name: hermes-agent
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - "/var/apps/hermes/shares/Hermes-Agent/data:/root/.hermes"
      - "hermes-agent-src:/opt/hermes"
    environment:
      - HERMES_HOME=/root/.hermes
      - TZ=Asia/Shanghai
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/hermes/.venv/bin
    command: gateway run
    networks:
      - hermes-net

  hermes-webui:
    image: ghcr.io/nesquena/hermes-webui
    container_name: hermes-webui
    depends_on:
      - hermes-agent
    ports:
      - "8787:8787"
    volumes:
      - "/var/apps/hermes/shares/Hermes-Agent/data:/home/hermeswebui/.hermes"
      - "hermes-agent-src:/home/hermeswebui/.hermes/hermes-agent"
      - "/var/apps/hermes/shares/Hermes-Agent/data/workspace:/workspace"
    environment:
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui
      - WANTED_UID=1000
      - WANTED_GID=1000
      - TZ=Asia/Shanghai
      # - HERMES_WEBUI_PASSWORD=***
    restart: unless-stopped
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge

volumes:
  hermes-agent-src:
